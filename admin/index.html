<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>KTB Media CMS</title>
  <link rel="icon" type="image/png" href="/assets/logo.png" />
</head>
<body>
  <!-- Netlify Identity widget — MUSI być przed Decap CMS -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

  <!-- Decap CMS — przypięta wersja dla stabilności -->
  <script src="https://unpkg.com/decap-cms@3.6.2/dist/decap-cms.js"></script>

  <script>
    // Obsługa linków z maila zaproszeniowego Netlify Identity:
    // Jeśli user przyjdzie z /#invite_token=... i nie jest zalogowany,
    // po udanym logowaniu przeładuj panel.
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", function (user) {
        if (!user) {
          window.netlifyIdentity.on("login", function () {
            document.location.href = "/admin/";
          });
        }
      });
    }
  </script>
</body>
</html>
