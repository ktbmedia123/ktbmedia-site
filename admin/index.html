<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>KTB Media CMS</title>
    <style>
      html,body{margin:0;padding:0;background:#0f0f12;color:#fff;font-family:Inter,Arial,sans-serif}
      .loading{display:flex;min-height:100vh;align-items:center;justify-content:center;flex-direction:column;gap:12px}
      .loading a{color:#f0b23d}
    </style>
  </head>
  <body>
    <div class="loading" id="loading">
      <strong>KTB Media CMS</strong>
      <div>Ładowanie panelu…</div>
      <div style="opacity:.7;font-size:14px">Jeśli logowanie nie otworzy się automatycznie, wróć po włączeniu Netlify Identity i Git Gateway.</div>
    </div>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <script>
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on('init', function(user) {
          if (!user) {
            window.netlifyIdentity.on('login', function() {
              document.location.href = '/admin/';
            });
          }
        });
      }
    </script>
    <script src="https://unpkg.com/decap-cms@^3.5.0/dist/decap-cms.js"></script>
  </body>
</html>
